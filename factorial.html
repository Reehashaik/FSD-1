<!DOCTYPE html>
<html>
<head>
<title>Number Operations</title>
<script>
function factorial() {
    let n = document.getElementById("num").value;
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact = fact * i;
    }

    document.getElementById("result").innerHTML = "Factorial: " + fact;
}

function fibonacci() {
    let n = document.getElementById("num").value;
    let a = 0, b = 1, c;
    let output = a + " " + b;

    for (let i = 2; i < n; i++) {
        c = a + b;
        output += " " + c;
        a = b;
        b = c;
    }

    document.getElementById("result").innerHTML = "Fibonacci Series: " + output;
}

function prime() {
    let n = document.getElementById("num").value;
    let output = "";

    for (let i = 2; i <= n; i++) {
        let isPrime = true;

        for (let j = 2; j < i; j++) {
            if (i % j == 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            output += i + " ";
        }
    }

    document.getElementById("result").innerHTML = "Prime Numbers: " + output;
}

function palindrome() {
    let n = document.getElementById("num").value;
    let rev = n.split("").reverse().join("");

    if (n == rev) {
        document.getElementById("result").innerHTML = n + " is a Palindrome";
    } else {
        document.getElementById("result").innerHTML = n + " is Not a Palindrome";
    }
}
</script>
</head>

<body>

<h2>Number Operations</h2>

Enter Number: <input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<p id="result"></p>

</body>
</html>
