<!DOCTYPE html>
<html>
<head>
<title>Voter Eligibility Check</title>

<style>
table{
    border-collapse: collapse;
    width: 50%;
    margin: 30px auto;
    text-align: center;
}

table, th, td{
    border: 2px solid black;
    padding: 10px;
}

th{
    background-color: lightcoral;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Voter Information</h2>

<div id="output"></div>

<script>

let name = prompt("Enter your name:");
let age = parseInt(prompt("Enter your age:"));

let eligibility = (age >= 18) ? "Eligible to Vote" : "Not Eligible";

let tableData = `
<table>
<tr>
<th>Name</th>
<th>Age</th>
<th>Status</th>
</tr>
<tr>
<td>${name}</td>
<td>${age}</td>
<td>${eligibility}</td>
</tr>
</table>
`;

document.getElementById("output").innerHTML = tableData;

</script>

</body>
</html>
