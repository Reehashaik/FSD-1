<!DOCTYPE html>
<html>
<head>
    <title>Week Days Using Switch</title>
    <script>
        function showDay() {

            // Taking input from user
            var day = parseInt(prompt("Enter a number (1-7):"));

            var dayName;

            // Switch case to display weekday
            switch(day) {
                case 1:
                    dayName = "Sunday";
                    break;
                case 2:
                    dayName = "Monday";
                    break;
                case 3:
                    dayName = "Tuesday";
                    break;
                case 4:
                    dayName = "Wednesday";
                    break;
                case 5:
                    dayName = "Thursday";
                    break;
                case 6:
                    dayName = "Friday";
                    break;
                case 7:
                    dayName = "Saturday";
                    break;
                default:
                    dayName = "Invalid Input! Please enter number between 1 and 7.";
            }

            // Displaying result
            document.getElementById("result").innerHTML = dayName;
        }
    </script>
</head>

<body>

    <h2>Display Week Day</h2>
    <button onclick="showDay()">Enter Day Number</button>
    <p id="result"></p>

</body>
</html>
