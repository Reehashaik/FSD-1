<!DOCTYPE html>
<html>
<head>
<title>Confirm Box Example</title>
</head>

<body>

<h2>JavaScript Output using confirm()</h2>

<p id="result"></p>

<script>
let answer = confirm("Do you like JavaScript?");

document.getElementById("result").innerHTML =
    "Your response: " + answer;
</script>

</body>
</html>
