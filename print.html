<!DOCTYPE html>
<html>
<head>
<title>Print Numbers 1 to 10</title>
</head>

<body>

<h2>Using For Loop</h2>
<p id="forLoop"></p>

<h2>Using While Loop</h2>
<p id="whileLoop"></p>

<h2>Using Do-While Loop</h2>
<p id="doWhileLoop"></p>

<script>
// For Loop
let forResult = "";
for(let i = 1; i <= 10; i++){
    forResult += i + " ";
}
document.getElementById("forLoop").innerHTML = forResult;


// While Loop
let j = 1;
let whileResult = "";
while(j <= 10){
    whileResult += j + " ";
    j++;
}
document.getElementById("whileLoop").innerHTML = whileResult;


// Do-While Loop
let k = 1;
let doWhileResult = "";
do{
    doWhileResult += k + " ";
    k++;
}while(k <= 10);
document.getElementById("doWhileLoop").innerHTML = doWhileResult;

</script>

</body>
</html>
