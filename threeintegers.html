<!DOCTYPE html>
<html>
<head>
    <title>Largest Number Program</title>
    <script>
        function findLargest() {

            // Getting three integers from user
            var num1 = parseInt(prompt("Enter first integer:"));
            var num2 = parseInt(prompt("Enter second integer:"));
            var num3 = parseInt(prompt("Enter third integer:"));

            var message = "";

            // Checking if all numbers are equal
            if (num1 === num2 && num2 === num3) {
                message = "EQUAL NUMBERS";
            } 
            else {
                // Finding the largest number
                var largest = Math.max(num1, num2, num3);
                message = largest + " LARGER NUMBER";
            }

            // Displaying result in HTML
            document.getElementById("result").innerHTML = message;

            // Showing information dialog
            alert(message);
        }
    </script>
</head>

<body onload="findLargest()">

    <h2>Largest of Three Numbers</h2>
    <p id="result"></p>

</body>
</html>
