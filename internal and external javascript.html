<!DOCTYPE html>
<html>
<head>
    <title>Internal and External JavaScript Example</title>

    <!-- Internal JavaScript -->
    <script>
        function addNumbers() {
            let num1 = parseInt(document.getElementById("n1").value);
            let num2 = parseInt(document.getElementById("n2").value);
            let sum = num1 + num2;

            document.getElementById("result").innerHTML =
                "Sum (Internal JS): " + sum;
        }
    </script>
</head>

<body>

    <h2>Calculator Example</h2>

    Enter First Number:
    <input type="number" id="n1"><br><br>

    Enter Second Number:
    <input type="number" id="n2"><br><br>

    <button onclick="addNumbers()">Add (Internal JS)</button>
    <button onclick="multiplyNumbers()">Multiply (External JS)</button>

    <h3 id="result"></h3>

    <!-- External JavaScript (Simulated Here) -->
    <script>
        // This part acts like an external JS file
        function multiplyNumbers() {
            let num1 = parseInt(document.getElementById("n1").value);
            let num2 = parseInt(document.getElementById("n2").value);
            let product = num1 * num2;

            document.getElementById("result").innerHTML =
                "Product (External JS): " + product;
        }
    </script>

</body>
</html>
